<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Volt — the no-build, secure-by-default web framework</title>
  <meta name="description" content="Volt is a tiny, no-build, signals-based web framework. Scaffold an app in one command, toggle auth/realtime/database from a config wizard, and ship — more secure than WordPress, simpler than the React stacks." />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    :root { --bg:#0f1115; --panel:#161a22; --line:#232a36; --ink:#e7e9ee; --muted:#9aa4b2; --accent:#ffd24a; }
    body { background: var(--bg); color: var(--ink); }
    .brand { font-weight: 800; letter-spacing: -.02em; }
    .accent { color: var(--accent); }
    .navx { background: rgba(17,21,28,.85); backdrop-filter: blur(6px); border-bottom: 1px solid var(--line); position: sticky; top: 0; z-index: 10; }
    .navx a { color: var(--muted); text-decoration: none; }
    .navx a:hover, .navx a.active { color: var(--accent); }
    .card-x { background: var(--panel); border: 1px solid var(--line); border-radius: 14px; }
    .hero h1 { font-weight: 800; letter-spacing: -.03em; line-height: 1.05; }
    .lead2 { color: var(--muted); }
    pre, code { color: #cfe3ff; }
    pre { background: #0b0d11; border: 1px solid var(--line); border-radius: 10px; padding: 14px 16px; overflow:auto; }
    .cmd { background:#0b0d11; border:1px solid var(--line); border-radius:10px; }
    .cmd code { color: var(--accent); }
    a { color: var(--accent); }
    .docs-side a { display:block; padding:.25rem .5rem; border-radius:8px; color:var(--muted); text-decoration:none; }
    .docs-side a:hover { background:#11151c; color:var(--ink); }
    .docs-side a.active { background:#11151c; color:var(--accent); }
    .feat { background: var(--panel); border:1px solid var(--line); border-radius:14px; height:100%; }
    table.cmp td, table.cmp th { border-color: var(--line) !important; }
    .badge-soft { background:#11151c; border:1px solid var(--line); color:var(--muted); }
    footer { border-top: 1px solid var(--line); color: var(--muted); }
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="/socket.io/socket.io.js"></script>
  <script type="module" src="/app.js"></script>
</body>
</html>
